name: Centralized CI/CD Pipeline

on:
  workflow_call:
    secrets:
      DOKPLOY_WEBHOOK_URL:
        required: false

jobs:
  pipeline:
    name: Build & Deploy Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout caller repository
        uses: actions/checkout@v4

      - name: Checkout CI/CD collection repository
        uses: actions/checkout@v4
        with:
          repository: pradananovanr/papa-ci-cd-collection
          ref: master
          path: .github/ci-cd-collection

      - name: Load Configuration
        id: load_config
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          if [ -z "$REPO_NAME" ]; then
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          fi
          
          CONFIG_FILE=".github/ci-cd-collection/$REPO_NAME/config.json"
          if [ ! -f "$CONFIG_FILE" ]; then
            echo "Error: Configuration file $CONFIG_FILE not found."
            exit 1
          fi
          
          echo "Loading configuration from $CONFIG_FILE..."
          
          # Read properties using jq and write to GITHUB_ENV
          echo "IMAGE_NAME=$(jq -r '.docker.image_name' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "REGISTRY=$(jq -r '.docker.registry' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "REGISTRY_IMAGE=$(jq -r '.docker.registry_image' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "DOCKERFILE=$(jq -r '.docker.dockerfile' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "CONTEXT=$(jq -r '.docker.context' $CONFIG_FILE)" >> $GITHUB_ENV
          
          # Build args mapping
          BUILD_ARGS=$(jq -r '.docker.build_args | select(. != null) | map("--build-arg " + .) | join(" ")' $CONFIG_FILE)
          echo "BUILD_ARGS=$BUILD_ARGS" >> $GITHUB_ENV
          
          # Health check properties
          echo "HEALTH_ENABLED=$(jq -r '.health_check.enabled' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "HEALTH_PORT_MAPPING=$(jq -r '.health_check.port_mapping' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "HEALTH_CONTAINER_NAME=$(jq -r '.health_check.container_name' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "HEALTH_URL=$(jq -r '.health_check.url' $CONFIG_FILE)" >> $GITHUB_ENV
          
          HEALTH_ENV=$(jq -r '.health_check.env | select(. != null) | map("-e " + .) | join(" ")' $CONFIG_FILE)
          echo "HEALTH_ENV=$HEALTH_ENV" >> $GITHUB_ENV
          
          # Deployment properties
          echo "DEPLOY_ENABLED=$(jq -r '.deployment.enabled' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "DEPLOY_TRIGGER_WEBHOOK=$(jq -r '.deployment.trigger_webhook' $CONFIG_FILE)" >> $GITHUB_ENV
          echo "DEPLOY_BRANCH=$(jq -r '.deployment.branch // "main"' $CONFIG_FILE)" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image for verification
        run: |
          docker build \
            --tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ env.REGISTRY_IMAGE }}:latest \
            -f ${{ env.DOCKERFILE }} \
            ${{ env.BUILD_ARGS }} \
            ${{ env.CONTEXT }}

      - name: Run container health check
        if: env.HEALTH_ENABLED == 'true'
        run: |
          docker run -d --name ${{ env.HEALTH_CONTAINER_NAME }} -p ${{ env.HEALTH_PORT_MAPPING }} ${{ env.HEALTH_ENV }} ${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          curl -sf ${{ env.HEALTH_URL }} > /dev/null && echo "✓ Site responds" || { echo "✗ Site not reachable"; docker logs ${{ env.HEALTH_CONTAINER_NAME }}; exit 1; }
          docker stop ${{ env.HEALTH_CONTAINER_NAME }}
          docker rm ${{ env.HEALTH_CONTAINER_NAME }}

      - name: Log in to Registry
        if: github.ref_name == env.DEPLOY_BRANCH && github.event_name == 'push' && env.DEPLOY_ENABLED == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push production image
        if: github.ref_name == env.DEPLOY_BRANCH && github.event_name == 'push' && env.DEPLOY_ENABLED == 'true'
        run: |
          docker build \
            --tag ${{ env.REGISTRY_IMAGE }}:${{ github.sha }} \
            --tag ${{ env.REGISTRY_IMAGE }}:latest \
            --push \
            -f ${{ env.DOCKERFILE }} \
            ${{ env.BUILD_ARGS }} \
            ${{ env.CONTEXT }}

      - name: Trigger Dokploy Redeploy
        if: github.ref_name == env.DEPLOY_BRANCH && github.event_name == 'push' && env.DEPLOY_ENABLED == 'true' && env.DEPLOY_TRIGGER_WEBHOOK == 'true'
        env:
          DOKPLOY_WEBHOOK_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DOKPLOY_WEBHOOK_URL" ]; then
            echo "DOKPLOY_WEBHOOK_URL secret is not set. Skipping redeployment."
          else
            echo "Triggering Dokploy redeploy..."
            curl -f -X GET "$DOKPLOY_WEBHOOK_URL"
          fi
